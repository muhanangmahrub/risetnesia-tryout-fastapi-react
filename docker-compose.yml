version: '3.8'

services:
  SQL_Server_Docker:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: SQL_Server_Docker
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "YourStrongPassword123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - application_network

  backend:
    build: ./backend
    platform: linux/amd64
    container_name: fastapi_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrongPassword123!@SQL_Server_Docker:1433/tryout_db?driver=ODBC+Driver+17+for+SQL+Server
      - JWT_SECRET=supersecretkeythatyoushouldchangeinproduction
      - DB_SERVER=SQL_Server_Docker
      - DB_USER=sa
      - DB_PASSWORD=YourStrongPassword123!
    depends_on:
      SQL_Server_Docker:
        condition: service_healthy
    networks:
      - application_network

volumes:
  sqlserver_data:

networks:
  application_network:
    driver: bridge
