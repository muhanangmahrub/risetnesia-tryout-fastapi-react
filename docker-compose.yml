version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrongPassword123!
      - POSTGRES_DB=tryout_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tryout_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - application_network

  backend:
    build: ./backend
    platform: linux/amd64
    container_name: fastapi_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:YourStrongPassword123!@postgres_db:5432/tryout_db
      - JWT_SECRET=supersecretkeythatyoushouldchangeinproduction
      - DB_SERVER=postgres_db
      - DB_USER=postgres
      - DB_PASSWORD=YourStrongPassword123!
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - application_network

volumes:
  postgres_data:

networks:
  application_network:
    driver: bridge
