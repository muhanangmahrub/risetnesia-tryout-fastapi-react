version: '3.8'

# ============================================================
# TEMPLATE - Copy to docker-compose.yml and fill in values
# ============================================================

services:
  SQL_Server_Docker:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: SQL_Server_Docker
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}        # <-- set in .env
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - application_network

  backend:
    build: ./backend
    platform: linux/amd64
    container_name: fastapi_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mssql+pyodbc://${DB_USER}:${DB_PASSWORD}@SQL_Server_Docker:1433/${DB_NAME}?driver=ODBC+Driver+17+for+SQL+Server
      - JWT_SECRET=${JWT_SECRET}                 # <-- set in .env
      - DB_SERVER=SQL_Server_Docker
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      SQL_Server_Docker:
        condition: service_healthy
    networks:
      - application_network

volumes:
  sqlserver_data:

networks:
  application_network:
    driver: bridge
